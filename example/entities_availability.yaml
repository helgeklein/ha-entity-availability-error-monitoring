# Example availability wrapper entities.
#
# Purpose:
# Define template binary sensors that report whether a device, entity, or
# integration should be treated as unavailable or offline.
#
# These wrapper sensors are the foundation of availability monitoring. They let
# you translate raw Home Assistant entities into clear monitoring signals with
# user-friendly metadata such as a display name and description.
#
# Expected variables:
# - source_entity:
#   The Home Assistant entity whose availability you want to monitor.
# - source_name:
#   A short human-readable name shown in notifications.
# - source_description:
#   A longer explanation of what is being monitored and what it means if it is
#   unavailable.
#
# Copy this file to ../private/entities_availability.yaml and replace the
# example sensors with template binary sensors for your own devices or
# integrations.

- name: "Heat Pump: Availability"
  unique_id: heat_pump_availability
  variables:
    source_entity: sensor.heat_pump_outdoor_temperature
    source_name: "Heat Pump"
    source_description: "Primary heat pump telemetry source. If unavailable, the device or its integration may be offline."
  availability: &template_entity_available "{{ has_value(source_entity) }}"
  state: &availability_sensor_state "{{ true }}"
  attributes:
    raw_value: &template_raw_value "{{ states(source_entity) }}"
    source_name: &template_source_name >-
      {{ source_name
         or device_attr(source_entity, 'name')
         or state_attr(source_entity, 'friendly_name')
         or source_entity }}
    source_description: &template_source_description "{{ source_description }}"
  device_class: &connectivity_device_class connectivity

- name: "Network Switch: Availability"
  unique_id: network_switch_availability
  variables:
    source_entity: sensor.network_switch_uptime
    source_name: "Network Switch"
    source_description: "Infrastructure telemetry source used to monitor switch availability."
  availability: *template_entity_available
  state: *availability_sensor_state
  attributes:
    raw_value: *template_raw_value
    source_name: *template_source_name
    source_description: *template_source_description
  device_class: *connectivity_device_class

- name: "Test Entity: Availability"
  unique_id: test_entity_availability
  variables:
    source_entity: input_text.monitoring_test_availability
    source_name: "Test Entity"
    source_description: "Self-contained availability test entity. In Home Assistant Developer Tools > States, set input_text.monitoring_test_availability to 'unavailable' or 'unknown' to trigger an alert. Set it to 'on' or 'off' to test recovery."
  availability: "{{ has_value(source_entity) }}"
  state: "{{ true }}"
  attributes:
    raw_value: "{{ states(source_entity) }}"
    source_name: *template_source_name
    source_description: *template_source_description
  device_class: *connectivity_device_class