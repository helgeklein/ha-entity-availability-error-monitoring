# Example error-state wrapper entities.
#
# Purpose:
# Define template binary sensors that report whether a device or integration is
# currently in an error state.
#
# These wrapper sensors convert raw error-code entities or status values into a
# simple on/off monitoring signal and provide readable metadata for generated
# notifications.
#
# Expected variables:
# - source_entity:
#   The Home Assistant entity that provides the raw error code or error state.
# - source_name:
#   A short human-readable name shown in notifications.
# - source_description:
#   A longer explanation of what is being monitored.
# - ok_values:
#   A list of raw values that should be treated as "no error". Any other value
#   is considered an active error.
#
# Copy this file to ../private/entities_errors.yaml and replace the example
# sensors with template binary sensors for your own devices or integrations.

- name: "Heat Pump: Error"
  unique_id: heat_pump_error
  variables:
    source_entity: sensor.heat_pump_error_code
    source_name: "Heat Pump"
    source_description: "Primary heat pump error-code source."
    ok_values:
      - ""
      - "0"
  availability: "{{ states(source_entity) != 'unavailable' }}"
  state: >-
    {% set raw_value = states(source_entity) %}
    {% if raw_value in ['unknown', 'none'] %}
      {{ none }}
    {% else %}
      {{ raw_value not in ok_values }}
    {% endif %}
  attributes:
    raw_value: "{{ states(source_entity) }}"
    source_name: >-
      {{ source_name
         or device_attr(source_entity, 'name')
         or state_attr(source_entity, 'friendly_name')
         or source_entity }}
    source_description: "{{ source_description }}"
    source_error_code: "{{ states(source_entity) }}"
  device_class: problem

- name: "Test Entity: Error"
  unique_id: test_entity_error
  variables:
    source_entity: input_text.monitoring_test_error_code
    source_name: "Test Entity"
    source_description: "Self-contained error test entity. In Home Assistant Developer Tools > States, set input_text.monitoring_test_error_code to a non-zero value such as E1 to trigger an alert. Set it to 0 or an empty value to test recovery."
    ok_values:
      - ""
      - "0"
  availability: "{{ states(source_entity) != 'unavailable' }}"
  state: >-
    {% set raw_value = states(source_entity) %}
    {% if raw_value in ['unknown', 'none'] %}
      {{ none }}
    {% else %}
      {{ raw_value not in ok_values }}
    {% endif %}
  attributes:
    raw_value: "{{ states(source_entity) }}"
    source_name: >-
      {{ source_name
         or device_attr(source_entity, 'name')
         or state_attr(source_entity, 'friendly_name')
         or source_entity }}
    source_description: "{{ source_description }}"
    source_error_code: "{{ states(source_entity) }}"
  device_class: problem